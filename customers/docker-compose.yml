version: "3.9"

services:
  # ── Infraestructura ─────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: customers_db
      POSTGRES_USER: magenta
      POSTGRES_PASSWORD: magenta
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magenta"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.3.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "magenta-dev-cluster"
    ports: ["9092:9092"]

  vault:
    image: hashicorp/vault:2.0
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]
    cap_add: [IPC_LOCK]
    command: vault server -dev

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [minio_data:/data]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
      KC_REALM_NAME: magenta
    ports: ["8080:8080"]

  redis:
    image: redis:8.0-alpine
    ports: ["6379:6379"]

  # ── Aplicación ─────────────────────────────────────────────────
  customers:
    build: .
    ports: ["8083:8083"]
    environment:
      DB_PASSWORD: magenta
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/magenta
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/magenta/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      VAULT_HOST: vault
      VAULT_TOKEN: dev-root-token
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: magenta-customers-docs
      AREAS_URL: http://areas:8081
      BANKS_URL: http://banks:8082
      PRODUCTS_URL: http://products:8084
      spring.datasource.url: "jdbc:postgresql://postgres:5432/customers_db?currentSchema=customers"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      vault:
        condition: service_started

volumes:
  pg_data:
  minio_data:

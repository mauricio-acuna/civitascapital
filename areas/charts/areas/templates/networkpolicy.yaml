apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "areas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "areas.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "areas.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Tráfico desde el API Gateway / Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8081
    # Scraping de métricas por Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress:
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Redis
    - ports:
        - protocol: TCP
          port: 6379
    # Kafka
    - ports:
        - protocol: TCP
          port: 9092
    # Keycloak JWKS
    - ports:
        - protocol: TCP
          port: 8080
    # OTel Collector (OTLP gRPC)
    - ports:
        - protocol: TCP
          port: 4317
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

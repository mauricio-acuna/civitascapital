replicaCount: 2

image:
  repository: harbor.magenta.es/magenta/areas
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets:
  - name: harbor-registry-secret

serviceAccount:
  create: true
  name: areas-sa

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60

env:
  DB_USER:
    secretKeyRef:
      name: areas-db-secret
      key: username
  DB_PASSWORD:
    secretKeyRef:
      name: areas-db-secret
      key: password
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_HOST: "redis"
  KEYCLOAK_JWKS_URI: "http://keycloak:8080/realms/magenta/protocol/openid-connect/certs"
  OTLP_ENDPOINT: "http://tempo:4317"

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 24  # permite hasta 2 min de arranque (24 × 5s)

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 15

# PostgreSQL desactivado en prod (usar instancia gestionada)
postgresql:
  enabled: false

spring:
  application:
    name: magenta-areas
  datasource:
    url: jdbc:postgresql://postgres:5432/areas_db?currentSchema=areas
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 2000
      idle-timeout: 600000
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    schemas: areas
    locations: classpath:db/migration
    baseline-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://schema-registry:8081}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/magenta/protocol/openid-connect/certs}

server:
  port: 8081
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      # spec §11.2: liveness NO consulta PG/Kafka/Redis — solo estado del proceso.
      # Los health indicators externos van solo en readiness.
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,kafka
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,kafka
  tracing:
    sampling:
      probability: ${TRACE_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://tempo:4317}
  metrics:
    tags:
      service: magenta-areas

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

magenta:
  cache:
    zone-ttl-seconds: 600
    compare-ttl-seconds: 3600
  ingestion:
    ine:
      schedule: "0 0 3 * * *"
    fiber:
      schedule: "0 30 3 * * SUN"

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","traceId":"%X{traceId}","spanId":"%X{spanId}","correlationId":"%X{correlationId}","service":"magenta-areas","message":"%msg"}%n'
  level:
    root: INFO
    com.magenta.areas: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banks_db?currentSchema=banks
    username: magenta
    password: magenta
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      properties:
        schema.registry.url: http://localhost:8081
    producer:
      properties:
        schema.registry.url: http://localhost:8081

magenta:
  clients:
    customers: http://localhost:8083
    products: http://localhost:8084
    areas: http://localhost:8081

management:
  tracing:
    sampling:
      probability: 1.0  # 100% en dev para visibilidad completa

logging:
  level:
    com.magenta.banks: DEBUG
    org.springframework.security: DEBUG

spring:
  application:
    name: magenta-servicios

  datasource:
    url: jdbc:postgresql://postgres:5432/services_db?currentSchema=services
    username: ${DB_USERNAME:magenta}
    password: ${DB_PASSWORD:magenta}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: services
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: services
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: magenta-servicios
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      enable-idempotence: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/magenta/protocol/openid-connect/certs}

server:
  port: 8085
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: on-param

zeebe:
  client:
    broker:
      gateway-address: ${ZEEBE_GATEWAY:zeebe:26500}
    security:
      plaintext: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACE_SAMPLE_RATE:0.1}

  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}

spring:
  mvc:
    problem-details:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

magenta:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

  clients:
    areas:     ${AREAS_URL:http://areas:8081}
    banks:     ${BANKS_URL:http://banks:8082}
    customers: ${CUSTOMERS_URL:http://customers:8083}
    products:  ${PRODUCTS_URL:http://products:8084}

  partners:
    weights:
      sla: 0.5
      nps: 0.3
      cost: 0.2

  outbox:
    relay:
      delay-ms: 5000

  sla:
    monitor:
      rate-ms: 60000

resilience4j:
  timelimiter:
    instances:
      areas:     { timeoutDuration: 2s, cancelRunningFuture: true }
      banks:     { timeoutDuration: 2s, cancelRunningFuture: true }
      customers: { timeoutDuration: 2s, cancelRunningFuture: true }
      products:  { timeoutDuration: 2s, cancelRunningFuture: true }
  circuitbreaker:
    instances:
      areas:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1500ms
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
      banks:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1500ms
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
      customers:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1500ms
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
      products:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1500ms
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
  retry:
    instances:
      areas:     { maxAttempts: 3, waitDuration: 200ms, enableExponentialBackoff: true, exponentialBackoffMultiplier: 2 }
      banks:     { maxAttempts: 3, waitDuration: 200ms, enableExponentialBackoff: true, exponentialBackoffMultiplier: 2 }
      customers: { maxAttempts: 3, waitDuration: 200ms, enableExponentialBackoff: true, exponentialBackoffMultiplier: 2 }
      products:  { maxAttempts: 3, waitDuration: 200ms, enableExponentialBackoff: true, exponentialBackoffMultiplier: 2 }
